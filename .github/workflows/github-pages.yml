# Where: .github/workflows/github-pages.yml
# What: Builds and deploys the Dicta landing page to GitHub Pages.
# Why: Host the static product LP for free under this repository's GitHub Pages project path.

name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/github-pages.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'site/index.html'
      - 'site/public/**'
      - 'site/src/**'
      - 'site/vite.config.ts'
      - 'resources/icon/claude-code.svg'
      - 'resources/icon/dock-icon.png'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build landing page
        run: pnpm run site:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
