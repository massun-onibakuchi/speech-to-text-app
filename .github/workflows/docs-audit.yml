name: Docs Audit

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  send-doc-frontmatter-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Send Takopi review prompt to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAKOPI_PROJECT_ALIAS: ${{ secrets.TAKOPI_PROJECT_ALIAS }}
          TELEGRAM_TOPIC_TITLE_PREFIX: Docs Audit
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/send-docs-audit-task.mjs
