# Where: .github/workflows/release-macos.yml
# What:  Builds, signs, and uploads the macOS installer package to GitHub Releases.
# Why:   Ship a signed `.pkg` installer without maintaining Electron auto-update metadata.

name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release verification
        run: |
          pnpm run typecheck
          pnpm run test

      - name: Build signed macOS package
        run: pnpm run dist:mac

      - name: Upload package to GitHub Release
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          mapfile -t PKG_FILES < <(find dist -maxdepth 1 -type f -name '*.pkg' | sort)

          if [[ "${#PKG_FILES[@]}" -eq 0 ]]; then
            echo "No .pkg artifact found under dist/"
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${PKG_FILES[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${PKG_FILES[@]}" --generate-notes --verify-tag
          fi
